name: lost-guard-frontend
static_sites:
  - name: frontend
    github:
      branch: main
      deploy_on_push: true
      repo: YOUR_GITHUB_USERNAME/Lost_Find
    source_dir: frontend
    build_command: pnpm build
    output_dir: dist
    envs:
      - key: EXPO_PUBLIC_API_URL
        scope: RUN_AND_BUILD
        value: https://lost-guard-ff5a358ce70b.herokuapp.com/api
